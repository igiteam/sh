<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            height: 100vh;
            overflow: hidden;
        }

        #script-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: #1e1e1e;
            position: relative;
        }

        .script-line {
            display: flex;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.5;
            min-width: fit-content;
            width: 100%;
        }

        .line-number {
            display: inline-block;
            width: 48px;
            padding: 0 8px 0 16px;
            color: #6e7681;
            text-align: right;
            user-select: none;
            border-right: 1px solid #404040;
            margin-right: 16px;
            background: #1e1e1e;
            flex-shrink: 0;
        }

        .line-content {
            flex: 1;
            white-space: pre;
            color: #d4d4d4;
        }

        code {
            font-family: inherit;
            display: inline;
            padding: 0;
            white-space: pre;
            background: transparent !important;
        }

        .hljs {
            padding: 0 !important;
            margin: 0 !important;
            background: transparent !important;
            display: inline;
        }

        /* Hidden download button - only appears if showDownload=1 */
        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2d2d30;
            color: #cccccc;
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            display: none;
        }

        .download-btn:hover {
            background: #3e3e42;
        }

        .download-btn.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div id="script-container"></div>

    <!-- Hidden download button (only shows when showDownload=1) -->
    <button id="downloadBtn" class="download-btn" onclick="downloadScript()">⬇️ Download .sh</button>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const scriptUrl = urlParams.get('url') || 'https://cdn.sdappnet.cloud/rtx/wine/urlpixelprint.sh';
        const showDownload = urlParams.get('download') === '1'; // Hidden unless &download=1

        // Show download button if requested
        if (showDownload) {
            document.getElementById('downloadBtn').classList.add('visible');
        }

        function downloadScript() {
            // Get current displayed script content without line numbers
            const lines = document.querySelectorAll('.script-line');
            let scriptContent = '';

            lines.forEach(line => {
                const lineContent = line.querySelector('.line-content');
                const codeEl = lineContent.querySelector('code');
                scriptContent += (codeEl ? codeEl.textContent : lineContent.textContent) + '\n';
            });

            const blob = new Blob([scriptContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = scriptUrl.split('/').pop() || 'script.sh';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Load and display script
        fetch(scriptUrl)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(data => {
                const container = document.getElementById('script-container');
                container.innerHTML = '';

                // Split into lines
                const lines = data.replace(/\r\n/g, '\n').split('\n');

                // Create lines with numbers
                lines.forEach((line, index) => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'script-line';

                    // Line number
                    const lineNum = document.createElement('span');
                    lineNum.className = 'line-number';
                    lineNum.textContent = (index + 1).toString();
                    lineDiv.appendChild(lineNum);

                    // Line content with syntax highlighting
                    const contentSpan = document.createElement('span');
                    contentSpan.className = 'line-content';

                    const code = document.createElement('code');
                    code.className = 'language-bash';
                    code.textContent = line || ' ';

                    contentSpan.appendChild(code);
                    lineDiv.appendChild(contentSpan);
                    container.appendChild(lineDiv);
                });

                // Apply highlighting
                hljs.highlightAll();
            })
            .catch(error => {
                document.getElementById('script-container').innerHTML =
                    '<div style="color: #f85149; padding: 20px;">❌ Error: ' + error.message + '</div>';
            });
    </script>
</body>

</html>
