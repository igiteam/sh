<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            height: 100vh;
            overflow: hidden;
        }

        #script-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: #1e1e1e;
            box-sizing: border-box;
        }

        pre {
            margin: 0;
            padding: 0;
            /* Removed padding */
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        code {
            font-family: inherit;
            display: block;
            padding: 0;
            /* Ensure no padding */
        }

        .hljs {
            padding: 0 !important;
            /* Override any highlight.js padding */
            margin: 0 !important;
        }
    </style>
</head>

<body>
    <div id="script-container"></div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const scriptUrl = urlParams.get('url') || 'https://cdn.sdappnet.cloud/rtx/wine/urlpixelprint.sh';

        fetch(scriptUrl)
            .then(response => response.text())
            .then(data => {
                const container = document.getElementById('script-container');
                const pre = document.createElement('pre');
                const code = document.createElement('code');
                code.className = 'language-bash';
                code.textContent = data;
                pre.appendChild(code);
                container.appendChild(pre);
                hljs.highlightAll();
            })
            .catch(error => {
                document.getElementById('script-container').innerHTML =
                    '<div style="color: #f85149; padding: 20px;">Error: ' + error.message + '</div>';
            });
    </script>
</body>

</html>
